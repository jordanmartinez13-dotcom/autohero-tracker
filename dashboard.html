<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoHero Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; }
  .header { background: #1a1a1a; color: #fff; padding: 1.5rem 2rem; display: flex; align-items: baseline; gap: 12px; }
  .header h1 { font-size: 18px; font-weight: 500; }
  .header span { font-size: 13px; color: #888; }
  .tabs { display: flex; background: #fff; border-bottom: 1px solid #e5e5e5; padding: 0 2rem; }
  .tab { background: none; border: none; border-bottom: 2px solid transparent; padding: 12px 16px 14px; font-size: 13px; color: #888; cursor: pointer; margin-bottom: -1px; }
  .tab.on { color: #1a1a1a; border-bottom-color: #1a1a1a; }
  .panel { display: none; padding: 1.5rem 2rem; }
  .panel.on { display: block; }
  .metrics { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
  .metric { background: #fff; border-radius: 10px; padding: 1rem 1.25rem; }
  .metric-label { font-size: 11px; color: #888; margin-bottom: 4px; }
  .metric-value { font-size: 22px; font-weight: 500; }
  .metric-sub { font-size: 11px; color: #888; margin-top: 3px; }
  .card { background: #fff; border-radius: 10px; padding: 1.25rem 1.5rem; margin-bottom: 1.25rem; }
  .card-title { font-size: 12px; font-weight: 500; color: #888; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .chart-wrap { position: relative; width: 100%; }
  .loading { text-align: center; padding: 4rem; color: #888; font-size: 14px; }
  .filter-row { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
  .filter-btn { background: #f5f5f0; border: 1px solid #e5e5e5; border-radius: 6px; padding: 4px 12px; font-size: 12px; cursor: pointer; }
  .filter-btn.on { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
</style>
</head>
<body>

<div class="header">
  <h1>AutoHero tracker</h1>
  <span id="last-updated">Loading...</span>
</div>

<div class="tabs">
  <button class="tab on" data-tab="overview">Overview</button>
  <button class="tab" data-tab="velocity">Velocity</button>
  <button class="tab" data-tab="prices">Prices</button>
</div>

<div id="loading" class="loading">Loading data from Google Sheets...</div>

<div id="panel-overview" class="panel">
  <div class="metrics">
    <div class="metric"><div class="metric-label">Total listings</div><div class="metric-value" id="m-total">—</div><div class="metric-sub">all markets</div></div>
    <div class="metric"><div class="metric-label">Largest market</div
